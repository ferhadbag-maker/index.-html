<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(180deg,#0a0f14,#0f2a33);
color:white;
}

.container{
width:350px;
}

.logo{
text-align:center;
margin-bottom:30px;
font-size:32px;
font-weight:bold;
}

.title{
margin-bottom:20px;
font-size:18px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #2c3e46;
background:#0e1f26;
color:white;
font-size:14px;
}

input::placeholder{
color:#9aa4aa;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:25px;
background:#1f5fbf;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.login-btn:hover{
background:#174c9e;
}

.forgot{
text-align:center;
margin-top:12px;
font-size:14px;
color:#c9d1d9;
cursor:pointer;
}

.divider{
text-align:center;
margin:20px 0;
color:#888;
font-size:13px;
}

.fb-btn{
width:100%;
padding:12px;
border-radius:25px;
border:1px solid #3b5998;
background:transparent;
color:white;
cursor:pointer;
}

.create-btn{
width:100%;
padding:12px;
border-radius:25px;
border:1px solid #2a6df4;
background:transparent;
color:#4ea1ff;
margin-top:15px;
cursor:pointer;
}

.meta{
text-align:center;
margin-top:25px;
font-size:14px;
color:#9aa4aa;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">Instagram</div>

<div class="title">Log into Instagram</div>

<input type="text" placeholder="Mobile number, username or email">

<input type="password" placeholder="Password">

<button class="login-btn">Log in</button>

<div class="forgot">Forgot password?</div>

<div class="divider">or</div>

<button class="fb-btn">Log in with Facebook</button>

<button class="create-btn">Create new account</button>

<div class="meta">Meta</div>

</div>

</body>
</html>
